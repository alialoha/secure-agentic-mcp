<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400" role="img" aria-labelledby="archTitle archDesc">
  <title id="archTitle">Secure MCP architecture</title>
  <desc id="archDesc">MCP server and governed MCP client linked by Streamable HTTP; client and LLM host use an LLM API for tool-calling.</desc>
  <defs>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- MCP Server -->
    <ellipse cx="200" cy="150" rx="138" ry="92" stroke="#9ca3af" stroke-width="1.5" opacity="0.45" transform="rotate(-2 200 150)"/>
    <ellipse cx="198" cy="148" rx="138" ry="92" stroke="#111827" stroke-width="2.2" fill="#f9fafb" transform="rotate(-1 198 148)"/>
    <text x="198" y="132" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#111827">MCP server</text>
    <text x="198" y="156" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#4b5563">tools | resources | prompts</text>
    <text x="198" y="182" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#6b7280">workspace + server audit</text>

    <!-- Bidirectional Streamable HTTP: server <-> MCP client -->
    <line x1="340" y1="128" x2="430" y2="128" stroke="#374151" stroke-width="2" marker-end="url(#arrR)"/>
    <line x1="430" y1="172" x2="340" y2="172" stroke="#374151" stroke-width="2" marker-end="url(#arrR)"/>
    <text x="385" y="112" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="600" fill="#374151">Streamable HTTP</text>
    <text x="385" y="198" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" fill="#6b7280">request / response (MCP)</text>

    <!-- Middle: MCP client role + app-level policy (not the same as "HTTP" to the LLM) -->
    <ellipse cx="560" cy="150" rx="132" ry="94" stroke="#9ca3af" stroke-width="1.5" opacity="0.45" transform="rotate(1.5 560 150)"/>
    <ellipse cx="558" cy="148" rx="132" ry="94" stroke="#ea580c" stroke-width="2.2" fill="#fff7ed" transform="rotate(0.5 558 148)"/>
    <text x="558" y="128" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#9a3412">MCP client + policy</text>
    <text x="558" y="154" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#c2410c">Operator / Flask Live</text>
    <text x="558" y="180" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#ea580c">permissions.json / audit.log</text>

    <!-- Bidirectional: governed host <-> LLM (LLM API, not MCP Streamable HTTP) -->
    <line x1="694" y1="128" x2="784" y2="128" stroke="#374151" stroke-width="2" marker-end="url(#arrR)"/>
    <line x1="784" y1="172" x2="694" y2="172" stroke="#374151" stroke-width="2" marker-end="url(#arrR)"/>
    <text x="739" y="112" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="600" fill="#374151">LLM API</text>
    <text x="739" y="198" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" fill="#6b7280">chat + tool calls</text>

    <!-- LLM -->
    <ellipse cx="920" cy="150" rx="138" ry="92" stroke="#9ca3af" stroke-width="1.5" opacity="0.45" transform="rotate(-1.5 920 150)"/>
    <ellipse cx="918" cy="148" rx="138" ry="92" stroke="#111827" stroke-width="2.2" fill="#fafafa" transform="rotate(1 918 148)"/>
    <text x="918" y="132" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#111827">LLM host</text>
    <text x="918" y="156" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#4b5563">tool-calling (pluggable model)</text>
    <text x="918" y="182" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#6b7280">proposes tools; policy runs first</text>
  </g>

  <rect x="60" y="268" rx="16" ry="16" width="980" height="92" fill="#fefce8" stroke="#eab308" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="550" y="302" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#854d0e">Security (client-side)</text>
  <text x="550" y="328" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#a16207">Policy wraps the MCP client: allow / ask / deny before a tool call is sent to the server; audit.log records outcomes.</text>
</svg>
